name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  metadata:
    name: Read version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_name: ${{ steps.version.outputs.version_name }}
      build_number: ${{ steps.version.outputs.build_number }}
      artifact_version: ${{ steps.version.outputs.artifact_version }}
    steps:
      - uses: actions/checkout@v4

      - id: version
        name: Validate tag against pubspec.yaml
        shell: python
        run: |
          import os
          import re
          import sys
          from pathlib import Path

          pubspec = Path("pubspec.yaml").read_text(encoding="utf-8")
          match = re.search(r"^version:\s*([^\s#]+)", pubspec, re.MULTILINE)
          if not match:
              print("pubspec.yaml is missing a version field", file=sys.stderr)
              sys.exit(1)

          version = match.group(1)
          version_name, _, build_number = version.partition("+")
          build_number = build_number or "1"
          tag = os.environ["GITHUB_REF_NAME"]
          accepted_tags = {f"v{version}", f"v{version_name}"}
          if tag not in accepted_tags:
              print(
                  f"Tag {tag!r} does not match pubspec version. "
                  f"Use one of: {', '.join(sorted(accepted_tags))}",
                  file=sys.stderr,
              )
              sys.exit(1)

          output = Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as fh:
              fh.write(f"version={version}\n")
              fh.write(f"version_name={version_name}\n")
              fh.write(f"build_number={build_number}\n")
              fh.write(f"artifact_version={version.replace('+', '-')}\n")

  windows:
    name: Build Windows setup
    runs-on: windows-latest
    needs: metadata
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build Windows release
        run: >
          flutter build windows --release
          --build-name "${{ needs.metadata.outputs.version_name }}"
          --build-number "${{ needs.metadata.outputs.build_number }}"

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Build setup package
        shell: powershell
        env:
          APP_VERSION: ${{ needs.metadata.outputs.artifact_version }}
        run: |
          $ErrorActionPreference = 'Stop'
          $sourceDir = Join-Path $PWD.Path 'build\windows\x64\runner\Release'
          $outputDir = Join-Path $PWD.Path 'dist\windows'
          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            'windows\installer\bilitune.iss' `
            "/DAppVersion=$env:APP_VERSION" `
            "/DSourceDir=$sourceDir" `
            "/DOutputDir=$outputDir"

      - uses: actions/upload-artifact@v4
        with:
          name: bilitune-windows-setup
          path: dist/windows/*.exe
          if-no-files-found: error

  android:
    name: Build signed Android APK
    runs-on: ubuntu-latest
    needs: metadata
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release-keystore.jks

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/app/release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          flutter build apk --release \
            --build-name "${{ needs.metadata.outputs.version_name }}" \
            --build-number "${{ needs.metadata.outputs.build_number }}"

      - name: Verify APK signature
        run: |
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -n 1)"
          "$APKSIGNER" verify --print-certs build/app/outputs/flutter-apk/app-release.apk

      - name: Rename APK
        run: |
          mkdir -p dist/android
          cp build/app/outputs/flutter-apk/app-release.apk \
            "dist/android/BiliTune-${{ needs.metadata.outputs.artifact_version }}-release.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: bilitune-android-apk
          path: dist/android/*.apk
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - metadata
      - windows
      - android
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/* --clobber
          else
            gh release create "$TAG_NAME" dist/* \
              --title "BiliTune $VERSION" \
              --notes "Automated release for BiliTune $VERSION."
          fi
